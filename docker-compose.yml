# Stack de desenvolvimento. PostGIS e Redis já presentes para a V1.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: fada
      POSTGRES_PASSWORD: fada
      POSTGRES_DB: fada
    ports: ["5432:5432"]
    volumes: ["fada_pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./backend
    env_file: ./backend/.env
    ports: ["8000:8000"]
    depends_on: [db, redis]
    volumes: ["./backend:/app"]

volumes:
  fada_pgdata:
